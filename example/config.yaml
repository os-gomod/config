# config.yaml
app:
  # name: production-app
  # version: 2.1.0
  # environment: staging
  # debug: false
server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 45s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 2097152
  tls:
    enabled: false
  rate_limit: 250
  graceful_timeout: 20s
database:
  driver: postgres
  host: db.example.com
  port: 5432
  name: production_db
  user: app_user
  max_open_conns: 50
  max_idle_conns: 20
  conn_max_lifetime: 10m
  migration_path: ./migrations
redis:
  addresses:
    - redis-primary:6379
    - redis-replica:6379
  db: 0
  pool_size: 20
  min_idle_conns: 10
  dial_timeout: 10s
  read_timeout: 5s
  write_timeout: 5s
  tls:
    enabled: false
cache:
  type: redis
  ttl: 15m
  max_size: 50000
  cleanup_interval: 10m
logging:
  level: warn
  format: json
  output: file
  file_path: /var/log/app/app.log
  max_size_mb: 500
  max_backups: 10
  max_age_days: 30
  compress: true
  fields:
    service: myapp
    version: "2.1.0"
features:
  metrics:
    enabled: true
  tracing:
    enabled: true
  profiling:
    enabled: false
  swagger:
    enabled: false
  graphql:
    enabled: true
  experimental:
    api: true
  maintenance:
    mode: false
monitoring:
  prometheus:
    enabled: true
    path: /metrics
    port: 9090
    namespace: myapp
  health:
    enabled: true
    path: /health
    detailed: true
    check_interval: 30s
  alerts:
    enabled: true
    webhook_url: https://alerts.example.com/webhook
    channel: "#production"
    threshold: 3
integrations:
  kafka:
    brokers:
      - kafka-1:9092
      - kafka-2:9092
      - kafka-3:9092
    topic: app-events
    group_id: app-group
    version: "3.0.0"
  s3:
    bucket: myapp-config
    region: us-west-2
    endpoint: https://s3.amazonaws.com
  slack:
    channel: "#alerts"
    username: ConfigBot
  pagerduty:
    severity: critical
