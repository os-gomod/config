# app.yaml — Base application configuration
app:
  name: "yml-os-gomod-demo"
  version: "2.0.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  tls:
    enabled: false
    cert_path: "/etc/ssl/certs/app.pem"
    key_path: "/etc/ssl/private/app-key.pem"

database:
  host: "localhost"
  port: 5432
  name: "app_db"
  user: "app_user"
  password: "dev_secret_password"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "300s"
  sslmode: "disable"

logging:
  level: "debug"
  format: "json"
  output: "stdout"
  file_path: "/var/log/app/app.log"
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30

redis:
  host: "localhost"
  port: 6379
  password: "redis_dev_pass"
  db: 0
  max_retries: 3
  pool_size: 10

observability:
  tracing:
    enabled: true
    sampling_rate: 1.0
    exporter: "jaeger"
    endpoint: "http://localhost:14268/api/traces"
  metrics:
    enabled: true
    path: "/metrics"
    port: 9090

feature_flags:
  new_ui:
    enabled: true
    type: "boolean"
    description: "Enable the new user interface"
  dark_mode:
    enabled: true
    type: "variant"
    variants:
      light: null
      dark: null
      auto: null
    description: "Theme selection"
  rollout_v2:
    enabled: true
    type: "percentage"
    percentage: 50.0
    description: "Percentage-based rollout for API v2"

auth:
  jwt_secret: "super-secret-jwt-key-change-in-production"
  token_expiry: "24h"
  refresh_token_expiry: "168h"
  api_key: "dev-api-key-12345"
